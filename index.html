<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bukhari Nexus Pvt Ltd</title>
    <!-- Base styles load first, then hot-swapped by our JavaScript script -->
    <link rel="stylesheet" href="style.css" id="nexus-dynamic-css">
</head>
<body>

    <!-- Premium Sticky Global Header Navigation Container -->
    <header>
        <div class="nav-container">
            <div class="brand-section" onclick="switchNexusModule('home')" style="cursor: pointer;">
                <h1>BUKHARI NEXUS</h1>
                <span>PVT LTD</span>
            </div>
            <nav class="nav-links">
                <button class="nav-btn active" id="btn-home" onclick="switchNexusModule('home')">Home Hub</button>
                <button class="nav-btn" id="btn-about" onclick="switchNexusModule('about')">About Corporate</button>
                <button class="nav-btn" id="btn-history" onclick="switchNexusModule('history')">Our History</button>
                <button class="nav-btn" id="btn-contact" onclick="switchNexusModule('contact')">Global Offices</button>
            </nav>
        </div>
    </header>

    <!-- The Dynamic Content Injection Zone -->
    <main id="dynamic-module-holder">
        <!-- Built dynamic components render inside here smoothly -->
    </main>

    <!-- Universal Corporate Network Footer -->
    <footer>
        <p>Bukhari Nexus Pvt Ltd &copy; 2026 | Multi-Sector Global Network</p>
        <p style="font-size: 0.75rem; margin-top: 0.5rem; opacity: 0.6;">
            Registered Trade Entities: Agricultural Supply • FMCG Retail Warehousing • International Mobility Fleets
        </p>
    </footer>

    <!-- Core Engine Scripts -->
    <script src="nexus-data.js"></script>
    <script src="nexus-media.js"></script>
    <script src="nexus-chat.js"></script>
</body>
</html>
