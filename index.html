<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bukhari Nexus Pvt Ltd</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="nexus-flag-screensaver"></div>

    <header class="nexus-navbar">
        <div class="nav-container">
            <div class="corporate-brand" onclick="loadPageModule('home')">
                <span class="brand-logo">🌐</span>
                <div class="brand-text">
                    <h1>BUKHARI NEXUS</h1>
                    <span class="sub-legal">Pvt Ltd</span>
                </div>
            </div>
            <nav class="nav-links">
                <button class="nav-btn" id="btn-home" onclick="loadPageModule('home')">Home Hub</button>
                <button class="nav-btn" id="btn-traders" onclick="loadPageModule('traders')">Bukhari Traders</button>
                <button class="nav-btn" id="btn-makkah" onclick="loadPageModule('makkah')">Al Makkah Store</button>
                <button class="nav-btn" id="btn-pty" onclick="loadPageModule('pty')">Bukhari PTY LTD</button>
            </nav>
        </div>
    </header>

    <main class="nexus-main-content" id="dynamic-page-holder">
        <div style="color: #64748b; text-align: center; padding: 40px;">Initializing Nexus System Modules...</div>
    </main>

    <footer class="nexus-footer">
        <div class="footer-container">
            <div class="footer-info">
                <p><strong>Bukhari Nexus Pvt Ltd</strong> © 2026 | All Rights Reserved.</p>
            </div>
            <div class="footer-contacts">
                <span>🇵🇰 PK Support: +92 347 6051990</span>
                <span>🇦🇺 AU Support: +61 474 024174</span>
            </div>
        </div>
    </footer>

    <script src="nexus-media.js"></script>
    <script src="nexus-chat.js"></script>
    
    <script>
        // System Page Runner Configuration Mapping
        const PageModules = {
            home: `
                <div class="hero-section">
                    <h2>A Unified Multi-Sector Ecosystem</h2>
                    <p>Bukhari Nexus Pvt Ltd bridges foundational regional supply chains with modern mobility infrastructure, managing diversified industries across global trade corridors.</p>
                </div>
                <div class="cards-grid">
                    <div class="business-preview-card" onclick="loadPageModule('traders')">
                        <div class="card-bg-placeholder" id="img-card-traders"></div>
                        <h3>Bukhari Traders</h3>
                        <p>Agricultural bulk commodity supply chains specializing in grain processing, wholesale wheat, and paddy logistics.</p>
                        <span class="action-link">Explore Segment →</span>
                    </div>
                    <div class="business-preview-card" onclick="loadPageModule('makkah')">
                        <div class="card-bg-placeholder" id="img-card-makkah"></div>
                        <h3>Al Makkah Store</h3>
                        <p>Consumer goods retail, supermarket trade operations, and distribution pipelines serving regional marketplaces.</p>
                        <span class="action-link">Explore Segment →</span>
                    </div>
                    <div class="business-preview-card" onclick="loadPageModule('pty')">
                        <div class="card-bg-placeholder" id="img-card-pty"></div>
                        <h3>Bukhari PTY LTD</h3>
                        <p>Modern transit systems, automotive assets, and international fleet networks driving logistics infrastructure.</p>
                        <span class="action-link">Explore Segment →</span>
                    </div>
                </div>
            `,
            traders: `
                <div class="hero-section">
                    <h2>🌾 Bukhari Traders (Grains Division)</h2>
                    <p>Driving standard agricultural supply networks, managing grain fields processing pipelines, and local delivery grids.</p>
                </div>
                <div class="cards-grid">
                    <div class="business-preview-card non-clickable">
                        <div class="card-bg-placeholder" id="img-grain-wheat"></div>
                        <h3>Wheat Supply Chains</h3>
                        <p>High-grade bulk agricultural grain procurement, milling partnerships, and national wholesale corridors.</p>
                    </div>
                    <div class="business-preview-card non-clickable">
                        <div class="card-bg-placeholder" id="img-grain-paddy"></div>
                        <h3>Paddy Rice Networks</h3>
                        <p>Premium raw paddy processing networks, field harvest tracking, and market distribution operations.</p>
                    </div>
                </div>
            `,
            makkah: `
                <div class="hero-section">
                    <h2>🛒 Al Makkah Store (FMCG & Retail)</h2>
                    <p>Your premium marketplace for household provisions, bulk daily essentials, and consumer distribution.</p>
                </div>
                <div class="single-display-layout">
                    <div class="detail-display-card">
                        <p>Al Makkah Store integrates modern inventory tracking systems with local retail accessibility, providing robust distribution of high-demand consumer packaged merchandise across thousands of households daily.</p>
                    </div>
                </div>
            `,
            pty: `
                <div class="hero-section">
                    <h2>🚗 Bukhari PTY LTD (Mobility Operations)</h2>
                    <p>International fleet assets, vehicle networks, and specialized commercial automotive transportation logistics.</p>
                </div>
                <div class="single-display-layout">
                    <div class="detail-display-card">
                        <p>Connecting regional hubs through fleet assets. Bukhari PTY LTD leads modern automotive utility services, transit architecture, and commercial operational workflows globally.</p>
                    </div>
                </div>
            `
        };

        function loadPageModule(moduleKey) {
            const displayHolder = document.getElementById('dynamic-page-holder');
            if(!displayHolder || !PageModules[moduleKey]) return;
            
            // Swap content
            displayHolder.innerHTML = PageModules[moduleKey];
            
            // Adjust Navigation tabs colors
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const targetBtn = document.getElementById('btn-' + moduleKey);
            if(targetBtn) targetBtn.classList.add('active');
            
            // Clear screensaver flags if viewing main tabs manually
            if (typeof triggerFlagScreensaver === "function") {
                triggerFlagScreensaver('clear');
            }
            
            // Tell media file to inject photos immediately into the new layout
            if(typeof fixMissingCardImages === "function") {
                setTimeout(fixMissingCardImages, 50);
            }
        }

        // Default run Home Hub on startup
        window.onload = () => { loadPageModule('home'); };
    </script>
</body>
</html>
