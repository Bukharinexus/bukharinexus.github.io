<!-- Tabbed Business Section -->
<section id="businesses" style="background: var(--light-grey);">
    <h2>Our Group Companies</h2>
    
    <!-- Desktop Tab Buttons -->
    <div class="tabs">
        <button class="tablink" onclick="openBusiness(event, 'Traders')">Bukhari Traders</button>
        <button class="tablink" onclick="openBusiness(event, 'Makkah')">Al Makkah Store</button>
        <button class="tablink" onclick="openBusiness(event, 'Pty')">Bukhari Pty Ltd</button>
    </div>

    <!-- Tab Content -->
    <div id="Traders" class="tabcontent">
        <h3>Bukhari Traders</h3>
        <p>Specialists in wheat, rice, and paddy trading.</p>
        <a href="traders.html" class="btn">View Profile</a>
    </div>

    <div id="Makkah" class="tabcontent">
        <h3>Al Makkah General Store</h3>
        <p>Wholesale and retail grocery and FMCG supply.</p>
        <a href="al-makkah.html" class="btn">View Profile</a>
    </div>

    <div id="Pty" class="tabcontent">
        <h3>Bukhari Pty Ltd</h3>
        <p>Vehicle rental solutions in Hobart, Tasmania.</p>
        <a href="bukhari-pty.html" class="btn">View Profile</a>
    </div>
</section>

<script>
function openBusiness(evt, name) {
    var i, tabcontent, tablinks;
    tabcontent = document.getElementsByClassName("tabcontent");
    for (i = 0; i < tabcontent.length; i++) { tabcontent[i].style.display = "none"; }
    tablinks = document.getElementsByClassName("tablink");
    for (i = 0; i < tablinks.length; i++) { tablinks[i].className = tablinks[i].className.replace(" active", ""); }
    document.getElementById(name).style.display = "block";
    evt.currentTarget.className += " active";
}
// Set default open
document.getElementsByClassName("tablink")[0].click();
</script>
